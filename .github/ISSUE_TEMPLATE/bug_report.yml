name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: How did this bug ouccur? (Include steps to reproduce, if relevant)
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Console Output
      description: Please include console output (if relevant)
    validations:
      required: false
