## local dev/evaluator profile with automatic grader image setup on backend startup
spring.datasource.url=jdbc:postgresql://localhost:5432/elastic_autograder
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.data.redis.host=localhost
spring.data.redis.port=6379

graders.setup-on-startup=true
graders.setup-fail-on-error=false
graders.setup-python-command=python
graders.config-path=../config/graders.json
