spring.cache.type=redis

grading.queue.enabled=true
grading.queue.name=grading-jobs
grading.worker.enabled=true
grading.worker.concurrency=8
grading.worker.poll-timeout=5s
grading.health.stale-running-threshold=5m

grading.kubernetes.namespace=elastic-grading
grading.kubernetes.job-ttl-seconds=300
grading.kubernetes.poll-interval=1s
grading.kubernetes.max-active-jobs=14
grading.kubernetes.cleanup-jobs=false

# prod and local host versions are in local and prod properties respectively
