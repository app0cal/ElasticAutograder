# Reference Kubernetes job shape for one grader run.
# Runtime jobs are generated by Fabric8 in the backend, not from this file.
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  namespace: elastic-grading
  labels:
    app: elastic-autograder
    component: grader
    job-id: "${JOB_ID}"
    institution-id: ${INSTITUTION_ID}
    grader-type: ${GRADER_TYPE}
  annotations:
    elastic-autograder/job-id: "${JOB_ID}"
    elastic-autograder/institution-id: ${INSTITUTION_ID}
    elastic-autograder/grader-type: ${GRADER_TYPE}
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  activeDeadlineSeconds: ${TIMEOUT_SECONDS}
  template:
    metadata:
      labels:
        app: elastic-autograder
        component: grader
        job-id: "${JOB_ID}"
        institution-id: ${INSTITUTION_ID}
        grader-type: ${GRADER_TYPE}
      annotations:
        elastic-autograder/job-id: "${JOB_ID}"
        elastic-autograder/institution-id: ${INSTITUTION_ID}
        elastic-autograder/grader-type: ${GRADER_TYPE}
    spec:
      restartPolicy: Never
      containers:
        - name: grader
          image: ${IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/main.py"]
          args: ["/work/submission.py", "${MANIFEST_PATH}"]
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
          volumeMounts:
            - name: submission-volume
              mountPath: /work
      volumes:
        - name: submission-volume
          configMap:
            name: ${SUBMISSION_CONFIGMAP}
