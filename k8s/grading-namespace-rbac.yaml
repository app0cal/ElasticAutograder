apiVersion: v1
kind: Namespace
metadata:
  name: elastic-grading
  labels:
    app: elastic-autograder
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: elastic-autograder
  namespace: elastic-grading
  labels:
    app: elastic-autograder
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: elastic-autograder-grader-runner
  namespace: elastic-grading
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: elastic-autograder-grader-runner
  namespace: elastic-grading
subjects:
  - kind: ServiceAccount
    name: elastic-autograder
    namespace: elastic-grading
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: elastic-autograder-grader-runner
